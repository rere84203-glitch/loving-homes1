<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>لوفينج هومز - فندق الكلاب</title>
    <meta charset="UTF-8">
    <meta name="description" content="Free Web tutorials">
    <meta name="keywords" content="لوفينج هومز, فندق الكلاب, حجز فندق للكلاب, مرافق فندق الكلاب, حزم فندق الكلاب">
    <meta name="author" content="rawaa">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../icons/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="accessibility-bar">
        <button id="increase-font"><i class="fas fa-search-plus"></i> تكبير</button>
        <button id="decrease-font"><i class="fas fa-search-minus"></i> تصغير</button>
        <button id="reset-font"><i class="fas fa-font"></i> إعادة</button>
        <button id="night-mode"><i class="fas fa-moon"></i> ليلي</button>
    </div>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="images/logo.png" alt="لوفينج هومز">
                <span>لوفينج هومز</span>
            </div>
            <div class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></div>
            <nav>
                <ul id="nav-menu">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="facilities.html">المرافق</a></li>
                    <li><a href="packages.html">الحزم</a></li>
                    <li><a href="booking.html" class="active">الحجز</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html">تواصل معنا</a></li>
                    <li><a href="faq.html">الأسئلة</a></li>
                    <li><a href="privacy.html">الخصوصية</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section>
            <h2 class="section-title">نموذج حجز الإقامة</h2>
            <div class="booking-form">
                <form id="bookingForm">
                    <div class="form-group">
                        <label>اسم صاحب الكلب:</label>
                        <input type="text" id="ownerName" required>
                    </div>
                    <div class="form-group">
                        <label>اسم الكلب:</label>
                        <input type="text" id="dogName" required>
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف:</label>
                        <input type="tel" id="phone" required>
                        <!-- استخدام type="tel" لتسهيل إدخال رقم الهاتف -->
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني:</label>
                        <input type="email" id="email" required>
                         <!-- التحقق من صحة البريد الإلكتروني تلقائياً -->
                    </div>
                    <div class="form-group">
                        <label>الحزمة المطلوبة:</label>
                        <select id="packageSelect">
                            <option value="day">اليوم الواحد</option>
                            <option value="classic">كلاسيك</option>
                            <option value="premium">lld.m</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>تاريخ الوصول:</label>
                        <input type="date" id="arrival" required>
                    </div>
                    <div class="form-group">
                        <label>تاريخ المغادرة:</label>
                        <input type="date" id="departure" required>
                    </div>
                    <div class="form-group">
                        <label>خدمات إضافية (اختياري):</label>
                        <textarea id="notes" rows="3" placeholder="ملاحظات أو خدمات إضافية"></textarea>
                    </div>
                    <button type="submit" class="btn" style="width:100%;">تأكيد الحجز</button>
                    <div id="formFeedback" style="margin-top:1rem;"></div>
                    <!-- مكان عرض رسالة نجاح أو خطأ بعد إرسال النموذج -->
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - لوفينج هومز فندق الكلاب | تصميم رواء رائد الخالدي</p>
    </footer>
    <div class="fixed-access">
        <button id="night-mode-float"><i class="fas fa-moon"></i></button>
        <button id="increase-font-float"><i class="fas fa-plus"></i></button>
        <button id="decrease-font-float"><i class="fas fa-minus"></i></button>
    </div>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const pkg = urlParams.get('package');
            if (pkg && document.getElementById('packageSelect')) {
                document.getElementById('packageSelect').value = pkg;
            }
        });
    </script>
</body>
</html>
