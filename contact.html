<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <link rel="icon" href="../icons/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="accessibility-bar">
        <button id="increase-font"><i class="fas fa-search-plus"></i> تكبير</button>
        <button id="decrease-font"><i class="fas fa-search-minus"></i> تصغير</button>
        <button id="reset-font"><i class="fas fa-font"></i> إعادة</button>
        <button id="night-mode"><i class="fas fa-moon"></i> ليلي</button>
    </div>

    <header>
        <div class="header-container">
            <div class="logo">
                <img src="images/logo.png" alt="لوفينج هومز">
                <span>لوفينج هومز</span>
            </div>
            <div class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></div>
            <nav>
                <ul id="nav-menu">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="facilities.html">المرافق</a></li>
                    <li><a href="packages.html">الحزم</a></li>
                    <li><a href="booking.html">الحجز</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html" class="active">تواصل معنا</a></li>
                    <li><a href="faq.html">الأسئلة</a></li>
                    <li><a href="privacy.html">الخصوصية</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <h2 class="section-title">تواصل معنا</h2>
            <div class="contact-grid">
                <div class="contact-info">
                    <p><i class="fas fa-map-marker-alt"></i> هونغ كونغ </p>
                    <p><i class="fas fa-phone"></i> +852 1234 5678</p>
                    <p><i class="fas fa-envelope"></i> info@lovinghomes.hk</p>
                    <p><i class="fas fa-clock"></i> استقبال الحجوزات: 24/7</p>
                    <div class="map-container">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3691.680935567112!2d114.1694!3d22.2783!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3404000000000000%3A0x0!2zMjLCsDE2JzQxLjkiTiAxMTTCsDEwJzA5LjgiRQ!5e0!3m2!1sar!2s!4v1700000000000" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    <!-- خريطة جوجل لعرض موقع الفندق في هونج كونج-->
                    </div>
                </div>
                <div>
                    <form id="contactForm">
                        <div class="form-group">
                            <label>الاسم</label>
                            <input type="text" id="contactName" required>
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="contactEmail" required>
                        </div>
                        <div class="form-group">
                            <label>الرسالة</label>
                            <textarea id="contactMsg" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn">إرسال</button>
                        <div id="contactFeedback"></div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - لوفينج هومز فندق الكلاب | تصميم رواء رائد الخالدي</p>
    </footer>

    <div class="fixed-access">
        <button id="night-mode-float"><i class="fas fa-moon"></i></button>

        <button id="decrease-font-float"><i class="fas fa-minus"></i></button>
    </div>
